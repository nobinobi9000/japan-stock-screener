name: Daily Stock Screening

on:
  schedule:
    # 毎日16時（JST = UTC+9）→ UTC 7時に実行
    - cron: '0 7 * * 1-5'  # 月〜金のみ
  workflow_dispatch:  # 手動実行も可能

# 権限を追加（重要！）
permissions:
  contents: write  # リポジトリへの書き込み権限

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests jpholiday matplotlib mplfinance

      - name: Run screening
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BASIC_WEBHOOK_URL: ${{ secrets.DISCORD_BASIC_WEBHOOK_URL }}
          DISCORD_PREMIUM_WEBHOOK_URL: ${{ secrets.DISCORD_PREMIUM_WEBHOOK_URL }}
          DISCORD_ANALYSIS_WEBHOOK_URL: ${{ secrets.DISCORD_ANALYSIS_WEBHOOK_URL }}
          DISCORD_CHART_WEBHOOK_URL: ${{ secrets.DISCORD_CHART_WEBHOOK_URL }}
          NOTIFICATION_SERVICE: discord
          PLAN_MODE: free_beta
          USE_SAMPLE: false
          ENABLE_EMAIL: false
          OUTPUT_DIR: docs
          MIN_SCORE: 30
          ENABLE_BACKTEST: true
          REPORT_BASE_URL: https://nobi-labo.com/japan-stock-screener
        run: |
          python stock_screener_v3_multiplan.py

      - name: Commit and push reports
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -f docs/
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily screening report $(date +%Y-%m-%d)"
          git push
